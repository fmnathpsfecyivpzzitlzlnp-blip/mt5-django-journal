{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h4 class="text-light mb-4">⚙️ Настройки профиля</h4>
        
        <div class="card shadow p-4 mb-4">
            <h5 class="text-success mb-3">Временные настройки</h5>

            <label class="form-label text-secondary small">1. Ваше местное время (Для графиков)</label>
            <select id="settings-tz" class="form-select bg-dark text-light border-secondary mb-3">
                <option value="0">Без смещения (UTC 0)</option>
                <option value="-4">Нью-Йорк (UTC -4)</option>
                <option value="+2">Киев / Восточная Европа (UTC +2)</option>
                <option value="+3">Москва / Минск (UTC +3)</option>
                <option value="+5">Ташкент (UTC +5)</option>
            </select>

            <label class="form-label text-secondary small">2. Время терминала (Только для импорта CSV)</label>
            <select id="broker-tz" class="form-select bg-dark text-light border-secondary mb-4">
                <option value="2">Восточная Европа Зима (EET, UTC+2)</option>
                <option value="3">Восточная Европа Лето (EEST, UTC+3)</option>
                <option value="0">Гринвич (UTC 0)</option>
            </select>

            <button class="btn btn-primary w-100 fw-bold" onclick="saveProfile()">💾 Сохранить настройки</button>
        </div>

        <div class="card shadow p-4 border border-warning bg-dark">
            <h5 class="text-warning mb-3">API Подключение (MT5)</h5>
            <p class="text-secondary small">Скоро здесь появится ваш персональный токен для подключения робота из MetaTrader 5 напрямую к этому дашборду.</p>
            <input type="text" class="form-control bg-secondary text-light border-0" value="В РАЗРАБОТКЕ..." disabled>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function initPage() {
        document.getElementById('settings-tz').value = localStorage.getItem('user_tz_offset') || "+3";
        document.getElementById('broker-tz').value = localStorage.getItem('broker_tz_offset') || "3";
    }

    function saveProfile() {
        localStorage.setItem('user_tz_offset', document.getElementById('settings-tz').value);
        localStorage.setItem('broker_tz_offset', document.getElementById('broker-tz').value);
        alert("Настройки успешно сохранены!");
    }
</script>
{% endblock %}

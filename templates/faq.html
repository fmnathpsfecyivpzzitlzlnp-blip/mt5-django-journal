{% extends "base.html" %}

{% block extra_head %}
<style>
    .smart-dropzone:focus { border-color: #0dcaf0 !important; background-color: rgba(13, 202, 240, 0.1) !important; box-shadow: 0 0 15px rgba(13, 202, 240, 0.2); }
    .faq-category-header { background: linear-gradient(90deg, #1a1a1a, #2a2a2a, #1a1a1a); border-bottom: 2px solid #0dcaf0; }

    /* НОВЫЕ СТИЛИ ДЛЯ ДИНАМИЧЕСКОГО ТЕКСТА */
    #faq-container {
        /* Дефолтные значения (перезапишутся из localStorage при загрузке) */
        --current-font-size: 14px;
        --current-text-color: #ffffff;
    }

    .dynamic-caption {
        font-size: var(--current-font-size) !important;
        color: var(--current-text-color) !important;
        transition: color 0.3s, font-size 0.3s;
        white-space: pre-wrap; /* Сохраняем переносы строк */
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="text-light">📚 База Знаний (FAQ)</h4>
    <button class="btn btn-info fw-bold text-dark" data-bs-toggle="modal" data-bs-target="#addTopicModal">➕ Новый вопрос</button>
</div>

<div class="card shadow p-2 mb-3 border-info bg-dark">
    <div class="d-flex gap-3 flex-wrap align-items-center">
        <span class="text-info fw-bold small">🎨 Текст ответов:</span>
        <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-info py-0" onclick="changeFontSize('12px')">12px</button>
            <button class="btn btn-sm btn-outline-info py-0" onclick="changeFontSize('14px')">14px</button>
            <button class="btn btn-sm btn-outline-info py-0" onclick="changeFontSize('18px')">18px</button>
            <button class="btn btn-sm btn-outline-info py-0" onclick="changeFontSize('22px')">22px</button>
            <button class="btn btn-sm btn-outline-info py-0" onclick="changeFontSize('28px')">28px</button>
        </div>
        <div class="d-flex gap-1 border-start border-secondary ps-3">
            <button class="btn btn-sm btn-outline-light py-0" onclick="changeTextColor('#ffffff')">Белый</button>
            <button class="btn btn-sm btn-outline-warning py-0" onclick="changeTextColor('#FFC107')">Желтый</button>
            <button class="btn btn-sm btn-outline-success py-0" onclick="changeTextColor('#4CAF50')">Зеленый</button>
            <button class="btn btn-sm btn-outline-primary py-0" onclick="changeTextColor('#4dabf7')">Синий</button>
        </div>
    </div>
</div>

<div class="card bg-dark border-secondary mb-4 shadow-sm">
    <div class="card-body py-2">
        <input type="text" id="faq-search" class="form-control bg-dark text-light border-info" placeholder="🔍 Поиск по вопросам, категориям или тексту ответов..." oninput="applyFAQSearch()">
    </div>
</div>

<div id="faq-container" class="accordion accordion-flush bg-dark border border-secondary rounded shadow-sm">
    <div class="text-center text-muted p-5">Загрузка базы знаний...</div>
</div>

<div class="modal fade" id="addTopicModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-info">
            <div class="modal-header bg-black border-secondary">
                <h5 class="modal-title text-info">Добавить новую тему</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <label class="small text-secondary mb-1">Рубрика (Категория)</label>
                <input type="text" id="topic-category" class="form-control bg-dark text-light border-secondary mb-3" placeholder="Напр: Ликвидность, Психология...">
                <label class="small text-secondary mb-1">Суть вопроса / Тема</label>
                <input type="text" id="topic-question" class="form-control bg-dark text-light border-secondary" placeholder="Как правильно выделять POI?">
            </div>
            <div class="modal-footer border-secondary">
                <button class="btn btn-info w-100 fw-bold text-dark" onclick="createTopic()">Создать тему</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    let faqData = [];
    let filesDict = {};
    let openAccordions = [];

    // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ДЛЯ ЦВЕТА И ШРИФТА
    let globalFontSize = localStorage.getItem('journalFontSize') || '14px';
    let globalTextColor = localStorage.getItem('journalTextColor') || '#ffffff';

    // 👇 1. ИСПОЛЬЗУЕМ initPage ВМЕСТО DOMContentLoaded 👇
    // base.html автоматически вызовет эту функцию только если пользователь авторизован!
    function initPage() {
        applyGlobalStyles();
        loadFAQ();
    }

    // Функция применения стилей к контейнеру FAQ
    function applyGlobalStyles() {
        const container = document.getElementById('faq-container');
        if (container) {
            container.style.setProperty('--current-font-size', globalFontSize);
            container.style.setProperty('--current-text-color', globalTextColor);
        }
    }

    // Функции вызываемые по кнопкам
    function changeFontSize(size) {
        globalFontSize = size;
        localStorage.setItem('journalFontSize', size);
        applyGlobalStyles();
    }

    function changeTextColor(color) {
        globalTextColor = color;
        localStorage.setItem('journalTextColor', color);
        applyGlobalStyles();
    }

    async function loadFAQ() {
        openAccordions = [];
        document.querySelectorAll('.accordion-collapse.show').forEach(el => {
            openAccordions.push(el.id);
        });

        try {
            const res = await fetch(API_BASE + 'faq_topics/');

            // 👇 2. ЗАЩИТА ОТ 403 И 500 ОШИБОК 👇
            if (!res.ok) {
                if (res.status === 401 || res.status === 403) {
                    alert("Сессия устарела. Страница будет перезагружена.");
                    window.location.reload();
                }
                return;
            }

            faqData = await res.json();

            // Если с сервера пришла дичь, делаем пустой массив
            if (!Array.isArray(faqData)) faqData = [];

            applyFAQSearch();
        } catch (e) {
            console.error("Ошибка сети:", e);
        }
    }

    function applyFAQSearch() {
        const query = document.getElementById('faq-search').value.toLowerCase().trim();
        if (!query) {
            renderFAQ(faqData);
            return;
        }
        const filtered = faqData.filter(topic => {
            const matchTopic = (topic.category || '').toLowerCase().includes(query) ||
                               (topic.question || '').toLowerCase().includes(query);
            if (matchTopic) return true;
            if (topic.blocks && topic.blocks.length > 0) {
                return topic.blocks.some(block => (block.text || '').toLowerCase().includes(query));
            }
            return false;
        });
        renderFAQ(filtered);
    }

    function renderFAQ(dataToRender) {
        const container = document.getElementById('faq-container');

        // 👇 3. ЗАЩИТА ОТ ПАДЕНИЯ forEach 👇
        if (!Array.isArray(dataToRender) || dataToRender.length === 0) {
            container.innerHTML = '<div class="text-center text-muted p-5">Ничего не найдено.</div>';
            return;
        }

        const grouped = {};
        dataToRender.forEach(t => {
            if (!grouped[t.category]) grouped[t.category] = [];
            grouped[t.category].push(t);
        });

        let html = '';
        for (const [category, topics] of Object.entries(grouped)) {
            html += `<div class="faq-category-header p-3 text-info fw-bold fs-5">${category}</div>`;
            topics.forEach(t => {
                html += `
                <div class="accordion-item bg-dark border-bottom border-secondary">
                    <h2 class="accordion-header" id="heading-${t.id}">
                        <button class="accordion-button collapsed bg-dark text-light fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-${t.id}">
                            ❓ ${t.question}
                        </button>
                    </h2>
                    <div id="collapse-${t.id}" class="accordion-collapse collapse" data-bs-parent="#faq-container">
                        <div class="accordion-body bg-black text-light p-4">
                            <div class="mb-4">
                                ${t.blocks.length === 0 ? '<div class="text-muted small">Ответов пока нет.</div>' : ''}
                                ${t.blocks.map(b => `
                                    <div class="card bg-dark border-secondary mb-3 shadow">
                                        ${b.image ? `<img src="${b.image}" class="card-img-top border-bottom border-secondary" style="max-height: 400px; object-fit: contain; cursor: pointer;" onclick="window.open('${b.image}')">` : ''}

                                        ${b.text ? `<div class="card-body p-3"><p class="m-0 dynamic-caption">${b.text}</p></div>` : ''}

                                        <div class="card-footer p-1 bg-dark text-end border-top border-secondary small">
                                            <button class="btn btn-sm btn-link text-danger py-0 px-1 text-decoration-none" onclick="deleteBlock(${b.id})">🗑️ Удалить блок</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="card bg-info bg-opacity-10 border-info p-3 mb-2 shadow-sm">
                                <h6 class="text-info small mb-3 fw-bold">➕ Добавить блок к ответу: Текст или Скриншот</h6>
                                <div class="row g-2">
                                    <div class="col-md-6">
                                        <div id="dropzone-${t.id}" tabindex="0" class="smart-dropzone p-3 text-center rounded position-relative" style="border: 2px dashed #0dcaf0; outline: none; cursor: default; min-height: 100px;">
                                            <span id="drop-text-${t.id}" class="text-muted small d-block">
                                                🖱️ <b>Кликни сюда и нажми Ctrl+V</b><br>или вставь ссылку TradingView
                                            </span>
                                            <input type="file" id="file-input-${t.id}" class="d-none" accept="image/*">
                                            <div id="preview-container-${t.id}" class="d-none mt-1 position-relative">
                                                <img id="preview-img-${t.id}" src="" class="img-fluid rounded border border-info" style="max-height: 120px; object-fit: contain;">
                                                <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0 m-1 py-0 px-2" onclick="clearDropzone(${t.id}, event)">✖</button>
                                            </div>
                                        </div>
                                        <input type="text" id="url-input-${t.id}" class="form-control form-control-sm bg-dark text-light border-info mt-2" placeholder="Или ссылка TradingView...">
                                    </div>
                                    <div class="col-md-6 d-flex flex-column">
                                        <textarea id="text-input-${t.id}" class="form-control form-control-sm bg-dark text-light border-info flex-grow-1 mb-2" placeholder="Поясняющий текст (необязательно)..."></textarea>
                                        <button class="btn btn-info btn-sm fw-bold w-100 text-dark" onclick="addBlock(${t.id})">💾 Сохранить блок</button>
                                    </div>
                                </div>
                            </div>
                            <div class="text-end mt-3 border-top border-secondary pt-2">
                                <button class="btn btn-sm btn-outline-danger py-0" onclick="deleteTopic(${t.id})">🗑️ Удалить всю тему</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        }
        container.innerHTML = html;
        setupAllDropzones(dataToRender);

        openAccordions.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('show');
                const btn = document.querySelector(`[data-bs-target="#${id}"]`);
                if (btn) btn.classList.remove('collapsed');
            }
        });
    }

    async function createTopic() {
        const cat = document.getElementById('topic-category').value.trim() || 'Разное';
        const q = document.getElementById('topic-question').value.trim();
        if(!q) return alert("Введи вопрос!");

        const scrollPos = window.scrollY;

        try {
            const res = await fetch(API_BASE + 'faq_topics/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                body: JSON.stringify({ category: cat, question: q }),
                credentials: 'same-origin' // 👈 ВОТ ЭТА СТРОЧКА СПАСЕТ ОТ 403
            });

            if (!res.ok) {
                const errText = await res.text();
                alert(`Ошибка сохранения (${res.status}). Возможно, сессия устарела. Обновите страницу.`);
                return;
            }

            document.getElementById('topic-question').value = '';
            await loadFAQ();
            window.scrollTo(0, scrollPos);
        } catch(e) {
            alert("Ошибка сети!");
        }
    }

    async function deleteTopic(id) {
        if(confirm("Удалить всё?")) {
            const scrollPos = window.scrollY;
            const res = await fetch(API_BASE + `faq_topics/${id}/`, { method: 'DELETE', headers: { 'X-CSRFToken': getCookie('csrftoken') } });
            if(res.ok) {
                await loadFAQ();
                window.scrollTo(0, scrollPos);
            }
        }
    }

    async function deleteBlock(id) {
        if(confirm("Удалить блок?")) {
            const scrollPos = window.scrollY;
            const res = await fetch(API_BASE + `faq_blocks/${id}/`, { method: 'DELETE', headers: { 'X-CSRFToken': getCookie('csrftoken') } });
            if(res.ok) {
                await loadFAQ();
                window.scrollTo(0, scrollPos);
            }
        }
    }

    function setupAllDropzones(data) {
        data.forEach(t => {
            const dropzone = document.getElementById(`dropzone-${t.id}`);
            const urlInput = document.getElementById(`url-input-${t.id}`);
            if(!dropzone) return;
            dropzone.addEventListener('paste', (e) => {
                e.preventDefault(); const items = (e.clipboardData || window.clipboardData).items;
                for (let index in items) { let item = items[index]; if (item.kind === 'file' && item.type.startsWith('image/')) { setPreview(t.id, item.getAsFile()); break; } else if (item.kind === 'string' && item.type === 'text/plain') { item.getAsString(text => { if (text.includes('tradingview.com/x/')) { urlInput.value = text; setPreview(t.id, text); } }); } }
            });
            urlInput.addEventListener('input', (e) => { if (e.target.value.includes('tradingview.com/x/')) setPreview(t.id, e.target.value); });
        });
    }

    function setPreview(topicId, fileOrUrl) {
        const previewContainer = document.getElementById(`preview-container-${topicId}`);
        const previewImg = document.getElementById(`preview-img-${topicId}`);
        const dropText = document.getElementById(`drop-text-${topicId}`);
        if (typeof fileOrUrl === 'string') { previewImg.src = fileOrUrl; filesDict[topicId] = null; }
        else { previewImg.src = URL.createObjectURL(fileOrUrl); filesDict[topicId] = fileOrUrl; document.getElementById(`url-input-${topicId}`).value = ''; }
        previewContainer.classList.remove('d-none'); dropText.classList.add('d-none');
    }

    function clearDropzone(topicId, event) {
        if(event) event.stopPropagation();
        filesDict[topicId] = null;
        document.getElementById(`url-input-${topicId}`).value = '';
        document.getElementById(`preview-container-${topicId}`).classList.add('d-none');
        document.getElementById(`drop-text-${topicId}`).classList.remove('d-none');
        document.getElementById(`preview-img-${topicId}`).src = '';
    }

    async function addBlock(topicId) {
        const fd = new FormData(); fd.append('topic_id', topicId); fd.append('text', document.getElementById(`text-input-${topicId}`).value);
        const urlValue = document.getElementById(`url-input-${topicId}`).value; const file = filesDict[topicId];
        if (file) fd.append('image', file); else if (urlValue) fd.append('image_url', urlValue);
        if(!fd.get('text') && !file && !urlValue) return alert("Пусто!");

        const scrollPos = window.scrollY;

        const res = await fetch(API_BASE + 'faq_blocks/', {
            method: 'POST',
            body: fd,
            headers: { 'X-CSRFToken': getCookie('csrftoken') },
            credentials: 'same-origin' // 👈 И ДОБАВЛЯЕМ ЕЁ СЮДА
        });

        if(res.ok) {
            clearDropzone(topicId);
            document.getElementById(`text-input-${topicId}`).value = '';
            await loadFAQ();
            window.scrollTo(0, scrollPos);
        } else {
            alert(`Ошибка сохранения. Статус: ${res.status}`);
        }
    }
</script>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        @page {
            size: a4 portrait;
            margin: 2cm;
        }

        /* Библиотека сама заменит sans-serif на DejaVu благодаря коду в Python */
        body, div, p, span, .text, .question, .category {
            font-family: sans-serif;
        }

        body {
            color: #333;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #0dcaf0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .category {
            color: #0dcaf0;
            font-size: 12pt;
            text-transform: uppercase;
        }

        .question {
            font-size: 18pt;
            font-weight: bold;
        }

        .block {
            margin-bottom: 20px;
            page-break-inside: avoid;
        }

        .text {
            font-size: 11pt;
            line-height: 1.5;
        }

        .image-container {
            text-align: center;
            margin-bottom: 10px;
        }

        img {
            max-width: 100%;
        }

        .footer {
            position: fixed;
            bottom: 0;
            text-align: right;
            font-size: 8pt;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="category">{{ topic.category }}</div>
        <div class="question">{{ topic.question }}</div>
    </div>

    {% for b in blocks %}
    <div class="block">

        {% if b.image %}
        <div class="image-container">
            <img src="{{ b.image.url }}">
        </div>
        {% endif %}

        {% if b.text %}
        <div class="text">{{ b.text|linebreaksbr }}</div>
        {% endif %}

    </div>
    {% endfor %}

    <div class="footer">
        Сгенерировано в Trading Journal PRO
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #eee; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #1e1e1e; border: none; border-radius: 10px; }
        .profit-positive { color: #00e676 !important; }
        .profit-negative { color: #ff5252 !important; }
        .nav-tabs .nav-link { color: #aaa; border: none; }
        .nav-tabs .nav-link.active { background-color: transparent; color: #00e676; border-bottom: 3px solid #00e676; }
        .heatmap-box { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .heatmap-box:hover { transform: scale(1.2); border: 1px solid #fff; }
        #auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .trade-details { max-width: 250px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <div id="auth-screen" style="display: none;">
        <div class="card p-4 shadow-lg text-center" style="width: 100%; max-width: 400px;">
            <h3 class="text-success mb-3">Trading Journal</h3>
            <ul class="nav nav-tabs mb-3 justify-content-center" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login-tab">Вход</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#register-tab">Регистрация</button></li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active text-center" id="login-tab">
                    <p class="text-secondary small">Для доступа необходимо войти в систему</p>
                    <button class="btn btn-success w-100 fw-bold py-2" onclick="redirectToLogin()">ВОЙТИ</button>
                </div>
                <div class="tab-pane fade" id="register-tab">
                    <div class="mb-2"><input type="text" id="reg-user" class="form-control bg-dark text-light border-secondary" placeholder="Придумайте Логин"></div>
                    <div class="mb-3"><input type="password" id="reg-pass" class="form-control bg-dark text-light border-secondary" placeholder="Придумайте Пароль"></div>
                    <button class="btn btn-primary w-100 fw-bold py-2" onclick="registerAccount()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 border-bottom border-secondary py-3">
            <div class="container">
                <a class="navbar-brand text-success fw-bold" href="/">XAUUSD | PRO</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link text-light" href="/">📥 Входящие <span id="badge-inbox" class="badge bg-danger ms-1" style="display:none;">0</span></a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="/journal/">📖 Дневник <span id="badge-journal" class="badge bg-primary ms-1" style="display:none;">0</span></a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="/analytics/">📊 Аналитика</a></li>
                        <li class="nav-item"><a class="nav-link text-warning" href="/risk-audit/">🔬 Квантовый Аудит</a></li>
                        <li class="nav-item"><a href="/playbook/" class="nav-link text-light fs-5">📘 Playbook</a></li>
                        <li class="nav-item"><a class="nav-link {% if request.path == '/faq/' %}active{% endif %}" href="{% url 'faq' %}">📚 База Знаний</a></li>
                    </ul>
                    <div class="d-flex gap-2">
                        <a href="/profile/" class="btn btn-sm btn-outline-light px-3">⚙️ Профиль</a>
                        <button class="btn btn-sm btn-outline-danger px-3" onclick="logout()">Выйти</button>
                    </div>
                </div>
            </div>
        </nav>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api/';

        function redirectToLogin() { window.location.href = '/api-auth/login/?next=/'; }
        async function logout() {
            await fetch('/api-auth/logout/', { method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') } });
            window.location.href = '/api-auth/login/?next=/';
        }

        async function registerAccount() {
            const u = document.getElementById('reg-user').value;
            const p = document.getElementById('reg-pass').value;
            const res = await fetch(API_BASE + 'register/', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if(res.ok) { alert(data.message); document.querySelector('[data-bs-target="#login-tab"]').click(); } else { alert(data.error); }
        }

        // 📊 ФУНКЦИЯ ОБНОВЛЕНИЯ СЧЕТЧИКОВ В МЕНЮ
        async function updateNavBadges() {
            try {
                const res = await fetch(API_BASE + 'trades/stats/');
                const data = await res.json();
                if (data.overview) {
                    const bInbox = document.getElementById('badge-inbox');
                    const bJournal = document.getElementById('badge-journal');

                    if(data.overview.inbox_count > 0) {
                        bInbox.innerText = data.overview.inbox_count;
                        bInbox.style.display = 'inline-block';
                    } else {
                        bInbox.style.display = 'none';
                    }

                    bJournal.innerText = data.overview.journal_count;
                    bJournal.style.display = 'inline-block';
                }
            } catch(e) {}
        }

        async function checkAccess() {
            try {
                const res = await fetch(API_BASE + 'trades/stats/');
                if (res.status === 403 || res.status === 401) { document.getElementById('auth-screen').style.display = 'flex'; }
                else {
                    document.getElementById('app-content').style.display = 'block';
                    updateNavBadges(); // 👈 Вызываем обновление меню при загрузке
                    if(typeof initPage === 'function') initPage();
                }
            } catch (e) { document.getElementById('auth-screen').style.display = 'flex'; }
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) { cookieValue = decodeURIComponent(cookie.substring(name.length + 1)); break; }
                }
            }
            return cookieValue;
        }

        document.addEventListener("DOMContentLoaded", checkAccess);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
